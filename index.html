<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List Website</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <nav class="navbar">
      <div class="nav-brand">Todo</div>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Todos</a></li>
        <li><a href="#">About</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle menu">☰</button>
    </nav>
    <header>
      <h1>Todo List</h1>
      <p>Build, plan, and track your tasks in one place.</p>
    </header>

    <section class="todo-app">
      <form id="todo-form">
        <input id="todo-input" type="text" placeholder="Add a new task" aria-label="New task">
        <button type="submit">Add</button>
      </form>

      <ul id="todo-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
